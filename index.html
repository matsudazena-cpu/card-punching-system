<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>A打卡系统</title>
    
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='180' height='180' viewBox='0 0 180 180'><rect width='180' height='180' fill='%23e5daeb'/><text x='50%' y='55%' text-anchor='middle' font-family='Arial' font-size='100' fill='white' font-weight='bold' dy='.3em'>A</text></svg>">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='32' height='32' viewBox='0 0 32 32'><rect width='32' height='32' fill='%23e5daeb'/><text x='50%' y='55%' text-anchor='middle' font-family='Arial' font-size='20' fill='white' font-weight='bold' dy='.3em'>A</text></svg>">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #e5daeb;
            --text-color: #b09fc8;
            --btn-color: #9483aa;
            --card-bg: #ffffff;
            --done-color: #81c784;
            --miss-color: #ef9a9a;
        }

        body {
            font-family: -apple-system, "SF Pro Text", Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: #4a4a4a;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container { width: 100%; max-width: 450px; }

        /* 顶部标题 */
        .header { text-align: center; margin-bottom: 20px; color: var(--btn-color); }

        /* 核心打卡卡片 */
        .main-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 8px 20px rgba(148, 131, 170, 0.2);
            text-align: center;
            margin-bottom: 20px;
        }

        .punch-main-btn {
            background-color: var(--btn-color);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            width: 80%;
            margin-bottom: 15px;
        }

        .quick-actions { display: flex; justify-content: space-around; margin-top: 10px; }
        .action-item { font-size: 14px; color: var(--text-color); cursor: pointer; }

        /* 四大分类按钮 */
        .category-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .cat-btn {
            background: white;
            border: 2px solid transparent;
            padding: 15px;
            border-radius: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            color: #666;
        }
        .cat-btn:active { transform: scale(0.95); }

        /* 详细项目列表 */
        .details-panel {
            background: white;
            border-radius: 20px;
            padding: 20px;
            display: none;
            margin-bottom: 20px;
            animation: slideDown 0.3s ease-out;
        }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        .detail-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #f0f0f0;
        }
        .detail-info { flex: 1; margin-right: 10px; }
        .detail-title { font-weight: bold; font-size: 14px; }
        .detail-desc { font-size: 12px; color: #999; }
        .inner-punch-btn {
            background: #f3f0f7;
            color: var(--btn-color);
            border: none;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
        }
        .inner-punch-btn.done { background: var(--done-color); color: white; }

        /* 统计区域 */
        .stats-section {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-top: 10px;
        }
        .streak-info { font-size: 24px; font-weight: bold; color: var(--btn-color); text-align: center; margin-bottom: 15px; }
        canvas { margin-top: 10px; }

    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>✨ 每日打卡</h1>
    </div>

    <div class="main-card">
        <button class="punch-main-btn" onclick="mainPunch()">✨ 今日打卡</button>
        <div class="quick-actions">
            <div class="action-item" onclick="quickCheck('up')">☀️ 签到 (早起)</div>
            <div class="action-item" onclick="quickCheck('down')">🌙 签退 (早睡)</div>
        </div>
        <p id="serverTime" style="font-size: 12px; color: #ccc; margin-top: 15px;"></p>
    </div>

    <div class="category-grid">
        <button class="cat-btn" onclick="showCategory('study')">🩵 学业</button>
        <button class="cat-btn" onclick="showCategory('health')">💚 身体健康</button>
        <button class="cat-btn" onclick="showCategory('skill')">💜 技能兴趣</button>
        <button class="cat-btn" onclick="showCategory('life')">🩷 生活心态</button>
    </div>

    <div id="detailsPanel" class="details-panel">
        <h3 id="panelTitle" style="color: var(--btn-color); margin-top: 0;">项目详情</h3>
        <div id="itemList"></div>
        <button onclick="closePanel()" style="width:100%; margin-top:15px; border:none; background:none; color:#ccc;">收起 ↑</button>
    </div>

    <div class="stats-section">
        <div class="streak-info">已坚持 <span id="streakCount">0</span> 天</div>
        <div style="font-size: 14px; color: #888; text-align: center;">📊 本周完成度统计</div>
        <canvas id="myChart" width="400" height="200"></canvas>
    </div>
</div>

<script>
    // 数据结构
    const dataConfig = {
        study: {
            title: "🩵 学业",
            items: [
                { id: 's1', name: '背单词', desc: '背六级单词' },
                { id: 's2', name: '六级真题', desc: '阅读加听力/写作加翻译' },
                { id: 's3', name: '专业课复习', desc: '复习当天所学，做题，整理不会的' }
            ]
        },
        health: {
            title: "💚 身体健康",
            items: [
                { id: 'h1', name: '早起', desc: '6:20前起床' },
                { id: 'h2', name: '早睡', desc: '23:00 前上床放下手机' },
                { id: 'h3', name: '校园跑', desc: '校园跑1.6公里' },
                { id: 'h4', name: '饮水健康', desc: '今日无奶茶等含糖饮料' }
            ]
        },
        skill: {
            title: "💜 技能兴趣",
            items: [
                { id: 'k1', name: '阅读', desc: '每天阅读非专业书籍 20 分钟' },
                { id: 'k2', name: '写作', desc: '每天写作30分钟' },
                { id: 'k3', name: '新闻摘要', desc: '每天看新闻' },
                { id: 'k4', name: '其它技能', desc: '备注：...' }
            ]
        },
        life: {
            title: "🩷 生活心态",
            items: [
                { id: 'l1', name: '整理寝室', desc: '每周清洁地面一次' },
                { id: 'l2', name: '写日记', desc: '记录心情和日程' }
            ]
        }
    };

    // 时间显示
    function updateTime() {
        const now = new Date();
        document.getElementById('serverTime').innerText = "系统记录时间: " + now.toLocaleString();
    }
    setInterval(updateTime, 1000);

    // 显示详细分类
    function showCategory(cat) {
        const panel = document.getElementById('detailsPanel');
        const list = document.getElementById('itemList');
        const config = dataConfig[cat];
        
        document.getElementById('panelTitle').innerText = config.title;
        list.innerHTML = '';
        
        config.items.forEach(item => {
            const isDone = localStorage.getItem(item.id + '_' + getTodayDate());
            list.innerHTML += `
                <div class="detail-item">
                    <div class="detail-info">
                        <div class="detail-title">${item.name}</div>
                        <div class="detail-desc">${item.desc}</div>
                    </div>
                    <button class="inner-punch-btn ${isDone?'done':''}" onclick="itemPunch('${item.id}', this)">
                        ${isDone ? '已完成' : '打卡'}
                    </button>
                </div>
            `;
        });
        panel.style.display = 'block';
    }

    function closePanel() { document.getElementById('detailsPanel').style.display = 'none'; }

    // 核心逻辑
    function getTodayDate() { return new Date().toISOString().split('T')[0]; }

    function itemPunch(id, btn) {
        if(btn.classList.contains('done')) return;
        localStorage.setItem(id + '_' + getTodayDate(), 'true');
        btn.innerText = '已完成';
        btn.classList.add('done');
        updateChart();
    }

    function mainPunch() {
        alert("✨ 今日总签到成功！别忘了完成具体项目哦！");
        let count = parseInt(localStorage.getItem('streak')) || 0;
        localStorage.setItem('streak', count + 1);
        document.getElementById('streakCount').innerText = count + 1;
    }

    function quickCheck(type) {
        const icon = type === 'up' ? '☀️' : '🌙';
        const msg = type === 'up' ? '早起签到成功' : '早睡准备完毕';
        alert(`${icon} ${msg}`);
    }

    // 图表初始化
    const ctx = document.getElementById('myChart').getContext('2d');
    let myChart = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: ['学业', '健康', '技能', '生活'],
            datasets: [{
                label: '完成项目数',
                data: [0, 0, 0, 0],
                backgroundColor: ['#b09fc8', '#81c784', '#9483aa', '#ef9a9a']
            }]
        },
        options: { scales: { y: { beginAtZero: true, max: 4 } } }
    });

    function updateChart() {
        const today = getTodayDate();
        const counts = [
            ['s1','s2','s3'], ['h1','h2','h3','h4'], 
            ['k1','k2','k3','k4'], ['l1','l2']
        ].map(group => group.filter(id => localStorage.getItem(id + '_' + today)).length);
        
        myChart.data.datasets[0].data = counts;
        myChart.update();
    }

    window.onload = () => {
        updateTime();
        updateChart();
        document.getElementById('streakCount').innerText = localStorage.getItem('streak') || 0;
    };
</script>

</body>
</html>
